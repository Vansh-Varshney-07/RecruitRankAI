<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RecruitRankAI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="kicker">Recruitment Intelligence</p>
        <h1>RecruitRank<span>AI</span></h1>
        <p class="copy">
          A signal-first AI recruiter that ranks candidates using structured profile data,
          behavioral signals, semantic fit, and optional LLM shortlist review.
        </p>
      </section>

      <section class="console">
        <div class="panel controls">
          <label>
            API Base URL
            <input id="apiBase" placeholder="https://your-api.onrender.com" />
          </label>
          <label>
            Job Description
            <textarea id="jobText" rows="12">Machine Learning Engineer

Required Skills:
Python, SQL, Machine Learning, Deep Learning

Preferred Skills:
Docker, Kubernetes, Linux

Experience:
2+ years</textarea>
          </label>
          <div class="grid">
            <label>
              Scan Limit
              <input id="scanLimit" type="number" value="1000" min="1" max="100000" />
            </label>
            <label>
              Top N
              <input id="topN" type="number" value="10" min="1" max="100" />
            </label>
          </div>
          <label class="toggle">
            <input id="useLlm" type="checkbox" />
            Use LLM recruiter brain
          </label>
          <button id="rankButton">Rank Candidates</button>
          <p id="status" class="status">Ready.</p>
        </div>

        <div class="panel results">
          <div class="results-head">
            <div>
              <p class="kicker">Shortlist</p>
              <h2 id="jobTitle">Waiting for ranking</h2>
            </div>
            <span id="resultCount">0 candidates</span>
          </div>
          <div id="cards" class="cards"></div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
